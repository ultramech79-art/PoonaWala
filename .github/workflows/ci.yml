name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_API_URL: https://poonawala.onrender.com
        run: npm run build

      - name: Build size
        run: du -sh dist/

  backend:
    name: Backend smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      GEMINI_API_KEY: ci-dummy-key
      GROQ_API_KEY: ci-dummy-key
      DAILY_API_KEY: ci-dummy-key
      CARTESIA_API_KEY: ci-dummy-key
      DATABASE_URL: sqlite+aiosqlite:///./goldeye.db
      ENABLE_GEMINI: "false"
      LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: App loads
        run: python -c "from app.main import app; print('FastAPI app loaded OK')"

      - name: Schemas load
        run: python -c "from app.models.schemas import AssessmentResult; print('Schemas OK')"

      - name: New routes load
        run: |
          python -c "from app.routes.video_eval import router; print('video_eval OK')"
          python -c "from app.routes.audio_eval import router; print('audio_eval OK')"
